# Copie para config/local.yaml e ajuste repos HF e modelos.
# Autenticação HF (opcional): huggingface-cli login ou HF_TOKEN no ambiente.

paths:
  project_root: .
  data_dir: data
  models_dir: models
  checkpoints_dir: checkpoints
  outputs_dir: outputs
  rag_index_dir: data/rag_index
  worfbench_repo: external/WorFBench

huggingface:
  train_repo: zjunlp/WorFBench_train
  train_filename: worfbench_train.json
  test_repo: zjunlp/WorFBench_test
  # Teste no HF = gold_traj/<task>/graph_eval.json (não há worfbench_test.json)
  test_layout: gold_traj
  # Token opcional; use variável de ambiente HF_TOKEN se o repo exigir
  token_env: HF_TOKEN

worfbench:
  repo_url: https://github.com/zjunlp/WorFBench.git
  repo_ref: main
  tasks:
    - wikihow
    - toolbench
    - toolalpaca
    - lumos
    - alfworld
    - webshop
    - os
  eval_encoder: all-mpnet-base-v2
  # CPU evita conflito com Ollama/GPU e erros cudaErrorLaunchFailure no MPNet.
  eval_device: cpu
  eval_types:
    - node
    - graph
  inference_api_port: 8000

inference:
  engine: ollama
  ollama:
    base_url: http://127.0.0.1:11434
    timeout_s: 600
    temperature: 0.0
    num_predict: 4096
    sft_suffix: "-sft"
    # Safetensors → GGUF via llama.cpp quando ollama create não converte a arquitetura
    # (ex. GraniteForCausalLM — PR ollama#8319 ainda aberto).
    gguf:
      enabled: true
      llama_cpp_dir: external/llama.cpp
      llama_cpp_repo: https://github.com/ggerganov/llama.cpp.git
      llama_cpp_ref: master
      outtype: q4_K_M
      force_architectures:
        - GraniteForCausalLM
        - NemotronHForCausalLM
        - NemotronForCausalLM
    # Opcional por modelo:
    # models:
    #   qwen35-4b:
    #     base: qwen35-4b
    #     sft: qwen35-4b-sft

models:
  slm:
    - id: granite-3b
      hf_id: ibm-granite/granite-4.1-3b
      sft_template: granite4
      ollama_via_gguf: true
    - id: qwen35-0.8b
      hf_id: Qwen/Qwen3.5-0.8B
      sft_template: qwen3_5_nothink
    - id: qwen35-2b
      hf_id: Qwen/Qwen3.5-2B
      sft_template: qwen3_5_nothink
    - id: qwen35-4b
      hf_id: Qwen/Qwen3.5-4B
      sft_template: qwen3_5_nothink
    - id: gemma3-1b
      hf_id: google/gemma-3-1b-it
      sft_template: gemma3
    - id: gemma3-4b
      hf_id: google/gemma-3-4b-it
      sft_template: gemma3
    - id: ministral-3-3b
      # FP8 default quebra ollama create; BF16 (oficial) para texto/WorFBench
      hf_id: mistralai/Ministral-3-3B-Instruct-2512-BF16
      sft_template: ministral3
    - id: nemotron-nano-4b
      hf_id: nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16
      sft_template: nemotron
      trust_remote_code: true
      ollama_via_gguf: true
  baseline_non_slm:
    - id: qwen35-27b
      hf_id: Qwen/Qwen3.5-27B
      sft_template: qwen3_5_nothink
      scenarios: [i0]

rag:
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  top_k: 2
  # Similaridade só na pergunta (último user); workflow (último assistant) só no prompt
  chunk_fields: [query]
  seed: 42

sft:
  framework: unsloth
  output_dir: checkpoints/sft
  num_train_epochs: 1
  learning_rate: 2.0e-5
  # batch 1 + accum 8 = batch efetivo 8
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  cutoff_len: 2048
  # remove demos few-shot longas no JSON SFT (não altera gold/RAG)
  max_example_tokens: 2048
  # Qwen3.5: bf16 LoRA (não QLoRA 4-bit — instável no hybrid)
  load_in_4bit: false
  load_in_16bit: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.0
  optim: adamw_8bit
  logging_steps: 10
  save_steps: 500
  warmup_ratio: 0.1
  seed: 42

scenarios:
  i0:
    description: Baseline — system prompt + tarefa, sem RAG, sem SFT
    use_rag: false
    use_sft_checkpoint: false
    worfbench_few_shot_flag: false
  rag:
    description: Few-shot via RAG sobre o treino do WorFBench
    use_rag: true
    use_sft_checkpoint: false
    worfbench_few_shot_flag: false
  sft:
    description: Modelo ajustado no treino; inferência sem RAG
    use_rag: false
    use_sft_checkpoint: true
    worfbench_few_shot_flag: false
  sft_rag:
    description: Modelo ajustado + recuperação no treino
    use_rag: true
    use_sft_checkpoint: true
    worfbench_few_shot_flag: false

reproducibility:
  seed: 42
  record_git_sha: true
